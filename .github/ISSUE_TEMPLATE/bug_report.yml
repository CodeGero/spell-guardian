name: Bug report
description: Report a problem with this tool
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations: {required: true}
  - type: input
    id: version
    attributes:
      label: Tool / Action version
      description: Output of `--version` or the Action ref (e.g. @v1).
    validations: {required: true}
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations: {required: true}
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations: {required: true}
